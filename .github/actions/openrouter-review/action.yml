name: 'OpenRouter AI Code Review'
description: 'Run OpenRouter API-based code review on a PR. Caller must set OPENROUTER_API_KEY and GH_TOKEN as env vars.'

inputs:
  pr_number:
    description: 'PR number to review'
    required: true
  profile:
    description: 'Review profile from review-profiles.yaml'
    required: false
    default: 'openrouter-general'

outputs:
  review_status:
    description: 'Status: success, failure, rate_limited, unavailable, skipped'
    value: ${{ steps.review.outputs.status }}
  is_agent_commit:
    description: 'Whether the last commit was by an agent'
    value: ${{ steps.check-agent.outputs.is_agent_commit }}
  review_artifact_name:
    description: 'Name of the uploaded review artifact'
    value: openrouter-review-${{ github.run_id }}-${{ github.run_attempt }}

runs:
  using: 'composite'
  steps:
    - name: Log commit info
      id: check-agent
      shell: bash
      run: |
        LAST_COMMIT_MSG=$(git log -1 --format='%s')
        LAST_COMMIT_AUTHOR=$(git log -1 --format='%an')

        echo "Last commit message: $LAST_COMMIT_MSG"
        echo "Last commit author: $LAST_COMMIT_AUTHOR"

        IS_AGENT_COMMIT="false"
        if [[ "$LAST_COMMIT_AUTHOR" == "AI Review Agent" ]] || \
           [[ "$LAST_COMMIT_AUTHOR" == "AI Pipeline Agent" ]] || \
           [[ "$LAST_COMMIT_AUTHOR" == "AI Agent Bot" ]]; then
          IS_AGENT_COMMIT="true"
          echo "Agent commit detected"
        fi

        echo "is_agent_commit=$IS_AGENT_COMMIT" >> $GITHUB_OUTPUT

    - name: Verify API key
      shell: bash
      run: |
        if [ -z "${OPENROUTER_API_KEY:-}" ]; then
          echo "::error::OPENROUTER_API_KEY is not set"
          exit 1
        fi
        echo "OPENROUTER_API_KEY is set (length: ${#OPENROUTER_API_KEY})"

    - name: Run OpenRouter Code Review
      id: review
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
        REVIEW_PROFILE: ${{ inputs.profile }}
      run: |
        echo "Starting OpenRouter PR Review (profile: $REVIEW_PROFILE)..."

        if ! command -v github-agents &>/dev/null; then
          echo "::warning::github-agents not found on PATH - skipping"
          echo "status=skipped" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Build command args
        ARGS=(pr-review "$PR_NUMBER" --profile "$REVIEW_PROFILE")

        # Run review and capture output
        set +e
        OUTPUT=$(github-agents "${ARGS[@]}" 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$OUTPUT"

        # Save review to file for artifact upload
        echo "$OUTPUT" > openrouter-review.md
        echo "Saved review to openrouter-review.md"

        # Handle transient API errors gracefully
        if [ $EXIT_CODE -ne 0 ]; then
          if grep -qiE '429|rate.?limit|quota|resource.?exhausted|usage.?limit|usage_limit|spending.?limit|hit.your.*limit' <<< "$OUTPUT"; then
            echo "::warning::OpenRouter API rate/usage limit hit - skipping review for this run"
            echo "status=rate_limited" >> $GITHUB_OUTPUT
            exit 0
          elif grep -qiE '503|502|fetch failed|service.?unavailable|server.?error|ECONNREFUSED|ETIMEDOUT|ENOTFOUND' <<< "$OUTPUT"; then
            echo "::warning::OpenRouter API is unavailable (likely transient outage) - skipping review for this run"
            echo "status=unavailable" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit $EXIT_CODE
          fi
        fi

        echo "status=success" >> $GITHUB_OUTPUT

    - name: Post unavailability notice
      if: steps.review.outputs.status == 'unavailable'
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        NOTICE_FILE="${RUNNER_TEMP:-/tmp}/unavailable-notice.md"
        cat > "$NOTICE_FILE" <<'NOTICE_EOF'
        ## OpenRouter AI Code Review

        **Warning:** OpenRouter API was unavailable during this run
        (likely a transient outage). Review skipped -- will run on next push.

        ---
        Generated by AI review pipeline. This is an advisory notice, not a blocking failure.
        NOTICE_EOF
        sed -i 's/^        //' "$NOTICE_FILE"
        gh pr comment "$PR_NUMBER" --body-file "$NOTICE_FILE" || \
          echo "::warning::Failed to post unavailability notice to PR"
        rm -f "$NOTICE_FILE"

    - name: Upload review artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: openrouter-review-${{ github.run_id }}-${{ github.run_attempt }}
        path: openrouter-review.md
        retention-days: 7
        if-no-files-found: ignore

    - name: Clean up working directory
      if: always()
      shell: bash
      run: |
        git checkout -- . 2>/dev/null || true
        git clean -fd 2>/dev/null || true
        echo "Working directory cleaned"
